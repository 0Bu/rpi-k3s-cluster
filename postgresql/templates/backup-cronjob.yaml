apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgresql-backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
          containers:
            - name: pg-dump
              image: bitnami/postgresql:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: PGHOST
                  value: postgresql.default.svc.cluster.local
                - name: PGPORT
                  value: "5432"
                - name: PGUSER
                  value: postgres
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-credentials
                      key: postgres-password
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  find /backup -maxdepth 1 -name 'pg_dump_*.sql.gz.tmp' -type f -delete 2>/dev/null || true
                  TS=$(date +%Y%m%d-%H%M)
                  for DB in {{ .Values.backup.databases | join " " }}; do
                    OUT=/backup/pg_dump_${DB}_${TS}.sql.gz
                    echo "[$(date -Is)] dumping ${DB} -> ${OUT}"
                    pg_dump --format=plain --no-owner --no-privileges "${DB}" \
                      | gzip -6 > "${OUT}.tmp"
                    mv "${OUT}.tmp" "${OUT}"
                    echo "[$(date -Is)] dump done: $(du -h "${OUT}" | cut -f1)"
                    # Prune per database, otherwise the retention count would be
                    # shared across all of them.
                    echo "[$(date -Is)] pruning old ${DB} dumps (keeping {{ .Values.backup.retentionCount }})"
                    ls -1t /backup/pg_dump_${DB}_*.sql.gz 2>/dev/null | tail -n +{{ add1 .Values.backup.retentionCount }} | xargs -r rm --
                  done
                  echo "[$(date -Is)] retained dumps:"
                  ls -1t /backup/pg_dump_*.sql.gz | head -n 10
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: postgresql-backup

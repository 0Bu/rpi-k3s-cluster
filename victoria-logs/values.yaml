nfs:
  server: 192.168.1.5
  path: /nfs/victoria-logs

victoria-logs:
  server:
    fullnameOverride: vlogs
    retentionPeriod: 1 # 1 month retention
    
    persistentVolume:
      enabled: true
      existingClaim: "victoria-logs"
      
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi
      
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.middlewares: default-https-redirect@kubernetescrd
      hosts:
        - name: victoria-logs.burau.dev
          path:
            - /
          port: http
        - name: logs.burau.dev
          path:
            - /
          port: http
      tls:
        - secretName: cloudflare-tls
          hosts:
            - victoria-logs.burau.dev
            - logs.burau.dev

  # Enable log collection via vector
  vector:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

mcp:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/victoriametrics/mcp-victorialogs
    tag: v1.9.0
    pullPolicy: IfNotPresent
  serverMode: http
  listenAddr: ":8080"
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: default-https-redirect@kubernetescrd
    hosts:
      - host: mcp-logs.burau.dev
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: cloudflare-tls
        hosts:
          - mcp-logs.burau.dev

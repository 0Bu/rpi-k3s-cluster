telegraf:
  service:
    enabled: false
  pdb:
    create: false
  envFromSecret: telegraf-influxdb-token
  env:
    - name: VICTORIA_METRICS_URL
      value: "http://victoria-metrics-server:8428"
    - name: INFLUXDB_URL
      value: "http://influxdb"
    - name: MODBUS_CONTROLLER
      value: "tcp://192.168.107.186:502"

  config:
    agent:
      interval: "10s"
      round_interval: true
      metric_batch_size: 1000
      metric_buffer_limit: 10000
      collection_jitter: "0s"
      flush_interval: "10s"
      flush_jitter: "0s"
      precision: ""
      debug: false
      quiet: false
      logfile: ""
      hostname: "$HOSTNAME"
      omit_hostname: false

    outputs:
      - influxdb:
          urls: ["${VICTORIA_METRICS_URL}"]
          database: "victoriametrics"
          skip_database_creation: true
          exclude_retention_policy_tag: true
          content_encoding: "gzip"
      - influxdb_v2:
          urls: ["${INFLUXDB_URL}"]
          token: "${INFLUXDB_TOKEN}"
          organization: "influxdata"
          bucket: "power"
          namepass: ["shelly", "tibber_pulse"]
      - influxdb_v2:
          urls: ["${INFLUXDB_URL}"]
          token: "${INFLUXDB_TOKEN}"
          organization: "influxdata"
          bucket: "ems-esp"
          namepass: ["ems-esp"]
      - influxdb_v2:
          urls: ["${INFLUXDB_URL}"]
          token: "${INFLUXDB_TOKEN}"
          organization: "influxdata"
          bucket: "foxess"
          namepass: ["foxess_grid", "foxess_grid_meter", "foxess_inverter", "foxess_energy", "foxess_pv", "foxess_battery", "foxess_battery_bms"]
#      - file:
#          files: ["stdout"]
#          namepass: ["foxess_grid", "foxess_grid_meter", "foxess_energy", "foxess_pv", "foxess_battery", "foxess_battery_bms"]

    inputs:
      - mqtt_consumer:
          name_override: "ems-esp"
          servers: ["tcp://mosquitto:1883"]
          topics: ["ems-esp/thermostat_data", "ems-esp/boiler_data"]
          data_format: "json"
      - mqtt_consumer:
          name_override: "shelly"
          servers: ["tcp://mosquitto:1883"]
          topics:
            - "shellypro3em-2cbcbbb2ddb8/status/#"
            - "shellypro3em63-3c8a1fd182e0/status/#"
            - "shellyplugsg3-8cbfea9fd6c8/status/#"
            - "shellyplus1pm-a8032ab9d8e4/status/#"
            - "shellypmmini-543204b695cc/status/#"
            - "shelly1pmminig4-ccba97c4e854/status/#"
            - "shelly1pmminig4-ccba97c65f18/status/#"
            - "shellypill-d885ac1a6284/status/#"
          data_format: "json"
      # Tibber Pulse Bridge — meter readings published by tibber-pulse-bot.
      # Listed topics are float-only; text fields (manufacturer, device_id,
      # meter_serial) and binary ON/OFF (bridge/available, bridge/cloud_mqtt,
      # bridge/update_available) intentionally excluded. The pivot processor
      # turns the topic-suffix tag into a clean field name so InfluxDB/Grafana
      # see fields like power_total, energy_import_total, ... directly.
      - mqtt_consumer:
          name_override: "tibber_pulse"
          servers: ["tcp://mosquitto:1883"]
          topics:
            - "tibber/pulse/power_total"
            - "tibber/pulse/power_l1"
            - "tibber/pulse/power_l2"
            - "tibber/pulse/power_l3"
            - "tibber/pulse/energy_import_total"
            - "tibber/pulse/energy_import_t1"
            - "tibber/pulse/energy_import_t2"
            - "tibber/pulse/energy_export_total"
            - "tibber/pulse/energy_export_t1"
            - "tibber/pulse/energy_export_t2"
            - "tibber/pulse/voltage_l1"
            - "tibber/pulse/voltage_l2"
            - "tibber/pulse/voltage_l3"
            - "tibber/pulse/current_l1"
            - "tibber/pulse/current_l2"
            - "tibber/pulse/current_l3"
            - "tibber/pulse/frequency"
          data_format: "value"
          data_type: "float"
          topic_parsing:
            - topic: "tibber/pulse/+"
              tags: "_/_/metric"

    processors:
      - pivot:
          tag_key: "metric"
          value_key: "value"
          namepass: ["tibber_pulse"]

  args:
    - --config
    - /etc/telegraf/telegraf.conf
    - --config-directory
    - /etc/telegraf/conf.d

  volumes:
    - name: telegraf-modbus
      configMap:
        name: telegraf-modbus

  mountPoints:
    - name: telegraf-modbus
      mountPath: /etc/telegraf/conf.d

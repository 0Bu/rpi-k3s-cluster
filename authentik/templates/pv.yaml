---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: authentik-postgresql
spec:
  capacity:
    storage: {{ .Values.persistence.size | default "10Gi" }}
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4.1
    - rsize=1048576
    - wsize=1048576
    - hard
    - timeo=600
    - retrans=2
    - noatime
  nfs:
    server: {{ .Values.nfs.server }}
    path: {{ .Values.nfs.path }}/postgresql
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: authentik-media
spec:
  capacity:
    storage: {{ .Values.persistence.size | default "10Gi" }}
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4.1
    - rsize=1048576
    - wsize=1048576
    - hard
    - timeo=600
    - retrans=2
    - noatime
  nfs:
    server: {{ .Values.nfs.server }}
    path: {{ .Values.nfs.path }}/media

nfs:
  server: 192.168.1.5
  path: /nfs/victoria-metrics

victoria-metrics:
  fullnameOverride: vm

  # Operator + CRDs werden vom Stack installiert.
  # crds.cleanup deaktiviert: Pre-Delete-Hook würde sonst bei einer
  # versehentlichen Application-Löschung (z.B. Helm-Hook-Race) alle
  # VictoriaMetrics-CRs (vmsingle, vmagent, scrapes…) wegräumen.
  victoria-metrics-operator:
    enabled: true
    crds:
      plain: true
      cleanup:
        enabled: false
    # prometheus-operator CRDs (ServiceMonitor, PodMonitor, Probe,
    # AlertmanagerConfig, ScrapeConfig) sind im Cluster nicht installiert.
    # Ohne disable bleibt der Operator beim Cache-Sync hängen → CrashLoop.
    operator:
      disable_prometheus_converter: true

  # Eigener Grafana-Chart bleibt bestehen → Dashboards/DS hier deaktivieren
  grafana:
    enabled: false
  defaultDashboards:
    enabled: false
  defaultRules:
    create: false

  # Eigene Aggregationen / Alerting deaktiviert (analog zur bisherigen Setup ohne alertmanager)
  vmalert:
    enabled: false
  alertmanager:
    enabled: false
  vmauth:
    enabled: false

  # k3s exponiert diese Komponenten nicht standardmäßig → Scrapes deaktivieren
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false

  prometheus-node-exporter:
    enabled: true
  kube-state-metrics:
    enabled: true

  vmsingle:
    enabled: true
    spec:
      retentionPeriod: "100y"
      replicaCount: 1
      # Deduplizierung: kollabiert exakt gleiche Zeitstempel pro Serie auf einen
      # Wert (verlustfrei für Scrapes ≥1s). Nötig, damit Re-Imports der
      # historischen InfluxDB-ems-esp-Daten idempotent sind (kein Doppelzählen).
      extraArgs:
        dedup.minScrapeInterval: "1ms"
      # Wiederverwendung des bestehenden NFS-PV `victoria-metrics`.
      # Voraussetzung beim Cutover: alte PVC gelöscht und PV-claimRef bereinigt.
      storage:
        accessModes:
          - ReadWriteOnce
        storageClassName: ""
        volumeName: victoria-metrics
        resources:
          requests:
            storage: 20Gi
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.middlewares: default-https-redirect@kubernetescrd
      hosts:
        - victoria-metrics.burau.dev
        - vm.burau.dev
      tls:
        - secretName: cloudflare-tls
          hosts:
            - victoria-metrics.burau.dev
            - vm.burau.dev

  vmagent:
    enabled: true
    spec:
      replicaCount: 1
      selectAllByDefault: true
      extraArgs:
        promscrape.streamParse: "true"

mcp:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/victoriametrics/mcp-victoriametrics
    tag: v1.120.1@sha256:16d9a30a6629319a8e84a73b9b54e1e9b9e5bf229bc40a7f1717c8602b0c1c09
    pullPolicy: IfNotPresent
  serverMode: http
  listenAddr: ":8080"
  vmInstanceType: single
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: default-https-redirect@kubernetescrd
    hosts:
      - host: mcp-vm.burau.dev
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: cloudflare-tls
        hosts:
          - mcp-vm.burau.dev


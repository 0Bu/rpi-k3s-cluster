nfs:
  server: 192.168.1.5

schedule: "0 2 * * *"

rclone:
  # renovate: image=rclone/rclone
  image: rclone/rclone:1.74.4@sha256:c61954aaa32328a5486715dd063a81c7879f5195ad3505cd362deddd509dc4a1
  configSecret: rclone-config
  destination: "google-drive-crypt:"
  # Bricht den Sync ab, wenn mehr als so viele Dateien am Ziel geloescht
  # wuerden (Schutz vor Backup-Wipe durch eine geleerte Quelle). Bewusst
  # nicht zu niedrig wegen des Part-Churns der VictoriaMetrics-Snapshots.
  maxDelete: 100
  # Optionale Inhalts-Verifikation via `rclone cryptcheck` nach jedem Sync.
  # Liest/verschluesselt die Quelle komplett -> CPU/IO-Last auf dem RPi,
  # daher standardmaessig aus.
  verify: false
  sealedConfig: ""

volumes:
  - name: adguard
    path: /nfs/adguard
  - name: evcc
    path: /nfs/evcc
  - name: grafana
    path: /nfs/grafana
  - name: home-assistant
    path: /nfs/home-assistant
  - name: postgresql
    # Nur die konsistenten logischen pg_dump-Backups sichern, nicht das
    # live laufende PGDATA (inkonsistent/nicht zuverlaessig wiederherstellbar).
    path: /nfs/postgresql/backup
  - name: victoria-metrics
    path: /nfs/victoria-metrics

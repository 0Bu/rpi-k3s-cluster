apiVersion: v1
kind: ConfigMap
metadata:
  name: rclone-script
  namespace: default
data:
  backup.sh: |
    #!/bin/sh
    set -eu

    # Secret-Mount ist read-only; Kopie in beschreibbares Verzeichnis
    cp /config/rclone.conf /tmp/rclone.conf
    RCLONE_CONFIG=/tmp/rclone.conf
    DESTINATION="{{ .Values.rclone.destination }}"
    VM_API="http://vmsingle-vm.default.svc.cluster.local:8428"

    run_backup() {
      local name="$1"
      local src="/data/${name}"
      local dst="${DESTINATION}${name}"

      echo "==> [$(date -u +%Y-%m-%dT%H:%M:%SZ)] Starting backup: ${name}"
      rclone sync "${src}" "${dst}" \
        --config "${RCLONE_CONFIG}" \
        --checksum \
        --transfers 2 \
        --tpslimit 5 \
        --retries 5 \
        --retries-sleep 60s \
        --log-level INFO
      echo "==> [$(date -u +%Y-%m-%dT%H:%M:%SZ)] Done: ${name}"
    }

    backup_victoria_metrics() {
      echo "==> [$(date -u +%Y-%m-%dT%H:%M:%SZ)] Starting backup: victoria-metrics"

      RESPONSE=$(wget -qO- "${VM_API}/snapshot/create")
      SNAPSHOT=$(echo "${RESPONSE}" | sed -n 's/.*"snapshot":"\([^"]*\)".*/\1/p')
      if [ -z "${SNAPSHOT}" ]; then
        echo "ERROR: Failed to create victoria-metrics snapshot: ${RESPONSE}"
        return 1
      fi
      echo "==> Snapshot created: ${SNAPSHOT}"

      SYNC_STATUS=0
      rclone sync "/data/victoria-metrics/snapshots/${SNAPSHOT}" "${DESTINATION}victoria-metrics" \
        --config "${RCLONE_CONFIG}" \
        --checksum \
        --transfers 2 \
        --tpslimit 5 \
        --retries 5 \
        --retries-sleep 60s \
        --log-level INFO || SYNC_STATUS=$?

      wget -qO- "${VM_API}/snapshot/delete?snapshot=${SNAPSHOT}" > /dev/null || true
      echo "==> Snapshot deleted: ${SNAPSHOT}"
      echo "==> [$(date -u +%Y-%m-%dT%H:%M:%SZ)] Done: victoria-metrics"

      return ${SYNC_STATUS}
    }

    FAILED=""
    {{- range .Values.volumes }}
    {{- if eq .name "victoria-metrics" }}
    backup_victoria_metrics || FAILED="${FAILED} victoria-metrics"
    {{- else }}
    run_backup "{{ .name }}" || FAILED="${FAILED} {{ .name }}"
    {{- end }}
    {{- end }}

    if [ -n "${FAILED}" ]; then
      echo "ERROR: the following volumes could not be backed up:${FAILED}"
      exit 1
    fi

    echo "==> All backups completed."

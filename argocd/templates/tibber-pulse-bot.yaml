apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tibber-pulse-bot
  namespace: default
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/resource-policy: keep
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/0Bu/tibber-pulse-bot.git
    path: chart
    targetRevision: HEAD
    helm:
      releaseName: tibber-pulse-bot
      values: |
        pulse:
          host: 192.168.107.118
          sealedSecret:
            # kubeseal --raw, scope=strict (name=tibber-pulse-bot, ns=default)
            encryptedPassword: 
        mqtt:
          host: mosquitto.default.svc.cluster.local
          port: 1883
          topic: tibber/pulse
        homeAssistant:
          discovery: true
        mode: push
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

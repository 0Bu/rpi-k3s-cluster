apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
spec:
  parentRefs:
    - name: traefik
      namespace: default
      sectionName: websecure
  hostnames:
    - evcc.burau.dev
  rules:
    - backendRefs:
        - name: {{ .Release.Name }}
          port: 7070

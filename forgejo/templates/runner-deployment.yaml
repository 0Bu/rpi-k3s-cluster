{{- if .Values.runner.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  labels:
    app.kubernetes.io/name: forgejo-runner
spec:
  replicas: 1
  # The dind sidecar owns a single docker state directory.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo-runner
    spec:
      # The runner image runs as uid 1000 and writes .runner into its /data
      # workdir, which an emptyDir would otherwise create as root-owned.
      securityContext:
        fsGroup: 1000
      containers:
        - name: dind
          image: {{ .Values.runner.dind.image.repository }}:{{ .Values.runner.dind.image.tag }}
          # k3s uses containerd, so there is no host docker socket to share.
          # The daemon is reached over a unix socket in a shared emptyDir; a TCP
          # listener would be reachable from every pod in the cluster and grants
          # unauthenticated root. `dockerd` must be args[0] — the image's
          # entrypoint appends --host=tcp://0.0.0.0:2375 to anything that starts
          # with a dash.
          args:
            - dockerd
            - --host=unix:///shared/docker.sock
            - --group=1000
          securityContext:
            privileged: true
          resources:
            {{- toYaml .Values.runner.resources.dind | nindent 12 }}
          volumeMounts:
            - name: docker-storage
              mountPath: /var/lib/docker
            - name: docker-socket
              mountPath: /shared
          livenessProbe:
            exec:
              command: ["docker", "-H", "unix:///shared/docker.sock", "info"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5

        - name: runner
          image: {{ .Values.runner.image.repository }}:{{ .Values.runner.image.tag }}
          env:
            - name: DOCKER_HOST
              value: unix:///shared/docker.sock
            - name: FORGEJO_URL
              value: {{ .Values.forgejo.gitea.config.server.ROOT_URL | quote }}
            - name: RUNNER_NAME
              value: {{ .Values.runner.name | quote }}
            - name: RUNNER_SECRET
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner
                  key: secret
          # The runner is registered server-side with the same shared secret,
          # so .runner is derived from the secret on every start and needs no
          # persistence. Waiting for dind avoids a crash loop on cold start.
          command:
            - sh
            - -c
            - |
              set -eu
              # The runner image ships no docker client; dockerd creates the
              # socket once it is ready to serve.
              until [ -S /shared/docker.sock ]; do
                echo "waiting for dind..."
                sleep 2
              done
              forgejo-runner create-runner-file \
                --instance "$FORGEJO_URL" \
                --name "$RUNNER_NAME" \
                --secret "$RUNNER_SECRET"
              exec forgejo-runner daemon
          resources:
            {{- toYaml .Values.runner.resources.runner | nindent 12 }}
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: docker-socket
              mountPath: /shared
      volumes:
        - name: docker-storage
          emptyDir: {}
        - name: runner-data
          emptyDir: {}
        - name: docker-socket
          emptyDir: {}
{{- end }}

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Release.Name }}-rclone
  namespace: default
spec:
  encryptedData:
    # rclone.conf (INI). The driver reads it via the PV's nodePublishSecretRef
    # under the `configData` key.
    configData: {{ .Values.rclone.sealedConfig | quote }}
  template:
    metadata:
      name: {{ .Release.Name }}-rclone
      namespace: default
    type: Opaque
